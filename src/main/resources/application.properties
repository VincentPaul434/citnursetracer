spring.application.name=survey
spring.jpa.open-in-view=false
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# Load local .env if present (KEY=VALUE format).
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# 2. Hibernate Settings
# Hibernate 6+ detects PostgreSQLDialect automatically, but keeping it is fine.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
# Add this to see the SQL Hibernate is running in your terminal
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}

app.security.jwt.private-key=${APP_JWT_PRIVATE_KEY:}
app.security.jwt.public-key=${APP_JWT_PUBLIC_KEY:}
