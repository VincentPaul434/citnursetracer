# Supabase/PostgreSQL template for local development profile
spring.datasource.url=jdbc:postgresql://${SUPABASE_HOST:your-project-ref.supabase.co}:${SUPABASE_PORT:6543}/${SUPABASE_DB:postgres}
spring.datasource.username=${SUPABASE_USER:postgres}
spring.datasource.password=${SUPABASE_PASSWORD:change-me}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# JWT key material can be DER base64 or PEM-formatted content
app.security.jwt.private-key=${APP_JWT_PRIVATE_KEY:}
app.security.jwt.public-key=${APP_JWT_PUBLIC_KEY:}

